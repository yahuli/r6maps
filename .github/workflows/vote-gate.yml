name: Vote Gate

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read
  checks: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4

      - name: Evaluate community PRs
        uses: actions/github-script@v7
        with:
          script: |
            const { evaluateVoteGate } = await import(`${process.env.GITHUB_WORKSPACE}/tools/evaluate-vote-gate.mjs`);
            const { owner, repo } = context.repo;

            core.info('Manual evaluation only. Cloudflare Worker scheduled handler is the only automatic merge entry point.');

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            for (const pull of pulls) {
              const fullPull = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pull.number,
              });
              const labelNames = fullPull.data.labels.map((label) => label.name);

              if (!labelNames.includes('community-data')) {
                continue;
              }

              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: pull.number,
                per_page: 100,
              });

              const reactions = await github.paginate(github.rest.reactions.listForIssue, {
                owner,
                repo,
                issue_number: pull.number,
                per_page: 100,
              });

              const status = await github.rest.repos.getCombinedStatusForRef({
                owner,
                repo,
                ref: fullPull.data.head.sha,
              });

              const checkRuns = await github.paginate(
                github.rest.checks.listForRef,
                {
                  owner,
                  repo,
                  ref: fullPull.data.head.sha,
                  per_page: 100,
                },
                (response) => response.data.check_runs,
              );

              const pendingStatuses = status.data.statuses.filter((item) => item.state === 'pending').length;
              const failingStatuses = status.data.statuses.filter((item) => item.state === 'failure' || item.state === 'error').length;
              const pendingCheckRuns = checkRuns.filter((run) => run.status !== 'completed').length;
              const failingCheckRuns = checkRuns.filter((run) =>
                ['failure', 'cancelled', 'timed_out', 'action_required', 'startup_failure'].includes(run.conclusion),
              ).length;
              const totalChecks = status.data.statuses.length + checkRuns.length;
              const pendingChecks = pendingStatuses + pendingCheckRuns;
              const failingChecks = failingStatuses + failingCheckRuns;

              const gate = evaluateVoteGate({
                labels: labelNames,
                author: fullPull.data.user.login,
                createdAt: fullPull.data.created_at,
                mergeableState: fullPull.data.mergeable_state ?? 'unknown',
                checks: {
                  passed: totalChecks > 0 && pendingChecks === 0 && failingChecks === 0,
                  state: totalChecks === 0 ? 'missing' : pendingChecks > 0 ? 'pending' : failingChecks > 0 ? 'failing' : 'passed',
                },
                changedFiles: files.map((file) => file.filename),
                votes: reactions.map((reaction) => ({
                  user: reaction.user.login,
                  userType: reaction.user.type,
                  reaction: reaction.content,
                  createdAt: reaction.created_at,
                })),
              });

              core.info(`#${pull.number}: ${gate.canAutoMerge ? 'eligible for Worker auto-merge' : `held: ${gate.reasons.join(', ')}`}`);
            }
