name: Vote Gate

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: read
  pull-requests: write
  checks: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4

      - name: Evaluate community PRs
        uses: actions/github-script@v7
        with:
          script: |
            const { evaluateVoteGate } = await import(`${process.env.GITHUB_WORKSPACE}/tools/evaluate-vote-gate.mjs`);
            const { owner, repo } = context.repo;

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            for (const pull of pulls) {
              const labelNames = pull.labels.map((label) => label.name);
              if (!labelNames.includes('community-data')) {
                continue;
              }

              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: pull.number,
                per_page: 100,
              });

              const reactions = await github.paginate(github.rest.reactions.listForIssue, {
                owner,
                repo,
                issue_number: pull.number,
                per_page: 100,
              });

              const risk = labelNames.includes('risk-low')
                ? 'low'
                : labelNames.includes('risk-high')
                  ? 'high'
                  : 'medium';

              const gate = evaluateVoteGate({
                risk,
                checksPassed: pull.mergeable_state === 'clean' || pull.mergeable_state === 'unstable',
                changedFiles: files.map((file) => file.filename),
                votes: reactions
                  .filter((reaction) => reaction.content === '+1' || reaction.content === '-1')
                  .map((reaction) => ({
                    user: reaction.user.login,
                    reaction: reaction.content,
                    qualified: reaction.user.type !== 'Bot' && reaction.user.login !== pull.user.login,
                  })),
              });

              if (!gate.canAutoMerge) {
                core.info(`#${pull.number} held: ${gate.reasons.join(', ')}`);
                continue;
              }

              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: pull.number,
                merge_method: 'squash',
              });
              core.info(`#${pull.number} merged by vote gate`);
            }
